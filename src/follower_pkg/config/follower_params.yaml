leader_pose_receiver:
  ros__parameters:
    udp_port: 8888
    # T_carmap<-flymap 静态对齐:比赛摆位时量取(m / rad)
    align_dx: 0.0
    align_dy: 0.0
    align_dyaw: 0.0

follower_node:
  ros__parameters:
    d_follow_cm: 80.0
    d_min_cm: 40.0
    breadcrumb_spacing_cm: 10.0
    prune_margin_cm: 50.0
    leader_timeout_s: 0.5
    publish_rate_hz: 20.0

diff_drive_controller:
  ros__parameters:
    kp_v: 1.0
    v_max_mps: 0.4
    kp_w: 1.5
    w_max_rps: 1.0
    align_gate_deg: 45.0
    pos_tol_cm: 5.0
    yaw_tol_deg: 8.0
    target_timeout_s: 1.0
    stop_burst_s: 1.0
    publish_rate_hz: 20.0
